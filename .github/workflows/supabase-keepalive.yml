name: Supabase Keepalive

on:
  schedule:
    # Every 5 days (UTC) to avoid 7-day inactivity pause on free tier.
    - cron: "0 6 */5 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci --omit=dev

      - name: Ping Supabase Postgres
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: node scripts/supabase-keepalive.mjs
